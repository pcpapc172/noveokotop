name: Desktop Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup WiX
        run: choco install wixtoolset -y

      - name: Grant gradlew permission
        shell: bash
        run: chmod +x gradlew

      - name: Build Windows EXE
        shell: bash
        run: |
          ./gradlew :desktopApp:packageExe \
            -PNOVEO_DESKTOP_PACKAGE_VERSION=1.0.${{ github.run_number }}

      - name: List outputs
        shell: bash
        run: |
          find desktopApp/build -type f | grep -i exe || true

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: noveo-windows
          path: |
            desktopApp/build/compose/binaries/main/exe/**/*.exe
            desktopApp/build/compose/binaries/main/msi/**/*.msi
