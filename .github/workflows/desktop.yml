name: Desktop Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: Windows
            task: packageExe
            artifact_glob: "desktopApp/build/compose/binaries/main/exe/*.exe"
            artifact_name: noveo-windows
          - os: ubuntu-latest
            label: Linux
            task: packageDeb
            artifact_glob: "desktopApp/build/compose/binaries/main/deb/*.deb"
            artifact_name: noveo-linux

    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Gradle wrapper JAR
        shell: bash
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.14.4/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build desktop package
        shell: bash
        run: ./gradlew :desktopApp:${{ matrix.task }} -PNOVEO_DESKTOP_PACKAGE_VERSION="$(date +'%Y.%m.%d')"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List files
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-${{ github.run_number }}
          name: "Noveo Desktop (build ${{ github.run_number }})"
          prerelease: true
          body: "Automated desktop build from commit ${{ github.sha }}"
          files: dist/*
