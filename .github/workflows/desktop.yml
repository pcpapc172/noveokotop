name: Desktop Build
on:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4


      - name: Make gradlew executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Build Windows EXE
        shell: bash
        run: |
          ./gradlew :desktopApp:packageExe \
            -PNOVEO_DESKTOP_PACKAGE_VERSION=1.0.${{ github.run_number }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: noveo-windows
          path: desktopApp/build/compose/binaries/main/exe/**/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -lh dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-${{ github.run_number }}
          name: "Noveo Desktop Build ${{ github.run_number }}"
          prerelease: true
          body: |
            Automated desktop build
            Commit: ${{ github.sha }}
          files: dist/*
